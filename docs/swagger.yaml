info:
  contact:
    name: API Support
  description: This is the API documentation for the Grocerics backend service.
  title: Grocerics API
  version: "1.1"
paths:
  /auth/delete:
    delete:
      description: Delete the authenticated client's account. STUB — deletion not
        yet wired.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Delete account (client)
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Issue a single-use reset token. Always 200, to avoid email enumeration.
      parameters:
      - description: Forgot password request payload
        in: body
        name: forgotPasswordRequest
        required: true
        schema:
          $ref: '#/definitions/v1.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Admin forgot password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Web-UI login with email + password. Clients use the phone/OTP routes.
      parameters:
      - description: Login request payload
        in: body
        name: loginRequest
        required: true
        schema:
          $ref: '#/definitions/v1.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Admin login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Logout request payload
        in: body
        name: logoutRequest
        required: true
        schema:
          $ref: '#/definitions/v1.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Admin logout
      tags:
      - Auth
  /auth/mobile-register:
    post:
      consumes:
      - application/json
      description: Register a client by phone (sends OTP). MOCK — the code is printed
        to the server logs AND returned as data.otp_code (dev only). Verify via /auth/verify-phone-otp,
        which creates the account.
      parameters:
      - description: Mobile register request payload
        in: body
        name: mobileRegisterRequest
        required: true
        schema:
          $ref: '#/definitions/v1.MobileRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Mobile register (client)
      tags:
      - Auth
  /auth/phone-login:
    post:
      consumes:
      - application/json
      description: Send a login OTP to the phone. MOCK — no SMS; the code is printed
        to the server logs AND returned as data.otp_code (dev only).
      parameters:
      - description: Mobile login request payload
        in: body
        name: mobileLoginRequest
        required: true
        schema:
          $ref: '#/definitions/dto.MobileLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Phone login (client)
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token request payload
        in: body
        name: refreshTokenRequest
        required: true
        schema:
          $ref: '#/definitions/v1.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Refresh admin token
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: Reset password request payload
        in: body
        name: resetPasswordRequest
        required: true
        schema:
          $ref: '#/definitions/v1.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Admin reset password
      tags:
      - Auth
  /auth/verify-phone-otp:
    post:
      consumes:
      - application/json
