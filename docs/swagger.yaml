definitions:
  dto.AboutUsResponse:
    properties:
      content:
        type: string
    type: object
  dto.AddressDTO:
    properties:
      city_id:
        type: string
      city_name:
        type: string
      id:
        type: string
      is_default:
        type: boolean
      label:
        type: string
      lat:
        type: number
      line1:
        type: string
      line2:
        type: string
      lng:
        type: number
      pincode:
        type: string
      serviceable:
        description: true if the pincode resolved to a serving city
        type: boolean
    type: object
  dto.BannerCardDTO:
    properties:
      image_url:
        type: string
      target_id:
        type: string
      target_type:
        type: string
      target_url:
        type: string
    type: object
  dto.BannerItem:
    description: A promotional banner shown on the storefront.
    properties:
      banner_id:
        description: Unique identifier for the banner
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      end_date:
        description: Date the banner stops being visible, RFC3339
        type: string
      image_url:
        description: URL of the banner image
        type: string
      is_active:
        description: |-
          Manual on/off switch. Can only turn a banner OFF — it never forces one
          live outside its date window.
        type: boolean
      is_live:
        description: |-
          Derived, read-only: whether the banner is actually showing right now
          (is_active AND inside the date window). This is what the grid should display.
        type: boolean
      start_date:
        description: Date the banner becomes visible, RFC3339
        type: string
      title:
        description: Admin-facing name, so banners are distinguishable in the grid
        type: string
    type: object
  dto.BannerMobileItem:
    description: A promotional banner shown on the mobile dashboard.
    properties:
      banner_id:
        description: Unique identifier for the banner
        type: string
      deeplink:
        description: App deeplink to navigate to when the banner is tapped
        type: string
      image_url:
        description: URL of the banner image
        type: string
    type: object
  dto.Banners:
    description: Paginated list of banners.
    properties:
      banners:
        description: Page of banners
        items:
          $ref: '#/definitions/dto.BannerItem'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  dto.Brand:
    description: Brand a product belongs to.
    properties:
      product_brand_id:
        description: Unique identifier for the brand
        type: string
      product_brand_name:
        description: Display name of the brand
        type: string
    type: object
  dto.BrandItem:
    description: A product brand as shown in brand listings.
    properties:
      brand_id:
        description: Unique identifier for the brand
        type: string
      brand_name:
        description: Display name of the brand
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      display_order:
        description: Curated sort order (lower shows first in the app)
        type: integer
      image_url:
        description: URL of the brand's display image
        type: string
      is_top_brand:
        description: Whether the brand is flagged as a top/featured brand
        type: boolean
      product_count:
        description: Number of products under this brand
        type: integer
      status:
        description: Status of the brand
        enum:
        - active
        - disabled
        type: string
    type: object
  dto.BrandList:
    description: Paginated list of brands.
    properties:
      brands:
        description: Page of brands
        items:
          $ref: '#/definitions/dto.BrandItem'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  dto.CartLineDTO:
    properties:
      average_price:
        $ref: '#/definitions/dto.MoneyDTO'
      image_url:
        type: string
      item_id:
        type: string
      pack_label:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
      variant_id:
        type: string
    type: object
  dto.CartResponse:
    properties:
      cart_id:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.CartLineDTO'
        type: array
      platforms:
        items:
          $ref: '#/definitions/dto.PlatformBreakdownDTO'
        type: array
    type: object
  dto.Categories:
    description: Paginated list of categories.
    properties:
      categories:
        description: Page of categories
        items:
          $ref: '#/definitions/dto.Category'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  dto.Category:
    description: A top-level product category.
    properties:
      category_id:
        description: Unique identifier for the category
        type: string
      category_name:
        description: Display name of the category
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      display_order:
        description: Curated sort order (lower shows first in the app)
        type: integer
      image_url:
        description: URL of the category's display image
        type: string
      is_top_category:
        description: Whether the category is flagged as a top/featured category
        type: boolean
      status:
        description: Status of the category
        enum:
        - active
        - disabled
        type: string
      sub_category_count:
        description: Number of subcategories nested under this category
        type: integer
    type: object
  dto.CategoryCardDTO:
    properties:
      id:
        type: string
      image_url:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  dto.CategoryData:
    description: Data Transfer Object for a Category entity.
    properties:
      category_id:
        type: string
      category_name:
        type: string
    type: object
  dto.Cities:
    description: Paginated list of cities.
    properties:
      cities:
        description: Page of cities
        items:
          $ref: '#/definitions/dto.CityItem'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  dto.CityDTO:
    properties:
      city_id:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  dto.CityItem:
    description: A serviceable city. The lat/lng + default_pincode are the location
    properties:
      city_id:
        description: Unique identifier for the city
        type: string
      default_pincode:
        description: Pincode used as the default QuickCommerce location anchor
        type: string
      enabled:
        description: Whether the city is serviceable
        type: boolean
      lat:
        description: Latitude of the city's QuickCommerce location anchor
        type: number
      lng:
        description: Longitude of the city's QuickCommerce location anchor
        type: number
      name:
        description: Display name of the city
        type: string
      slug:
        description: URL-safe name
        type: string
      state:
        description: State the city sits in
        type: string
    type: object
  dto.ClientAuthResponse:
    properties:
      access_token:
        description: JWT access token used to authenticate subsequent requests
        type: string
      is_new:
        type: boolean
      refresh_token:
        description: Token used to obtain a new access token once the current one
          expires
        type: string
      user_data:
        allOf:
        - $ref: '#/definitions/dto.UserData'
        description: User data associated with the authenticated user
    type: object
  dto.DailyActiveUsers:
    description: Daily active user counts for the current week, keyed by day.
    properties:
      friday:
        description: Active users on Friday
        type: integer
      monday:
        description: Active users on Monday
        type: integer
      saturday:
        description: Active users on Saturday
        type: integer
      sunday:
        description: Active users on Sunday
        type: integer
      thursday:
        description: Active users on Thursday
        type: integer
      tuesday:
        description: Active users on Tuesday
        type: integer
      wednesday:
        description: Active users on Wednesday
        type: integer
    type: object
  dto.DashboardMobile:
    description: Envelope for the mobile app's home dashboard endpoint.
    properties:
      banners:
        description: Promotional banners for the mobile dashboard
        items:
          $ref: '#/definitions/dto.BannerMobileItem'
        type: array
      top_stores:
        description: Featured stores for the mobile dashboard
        items:
          $ref: '#/definitions/dto.TopStoreMobileItem'
        type: array
      trending_categories:
        description: Trending product categories for the mobile dashboard
        items:
          $ref: '#/definitions/dto.TrendingCategoryMobileItem'
        type: array
      trending_items:
        description: Trending products for the mobile dashboard
        items:
          $ref: '#/definitions/dto.TrendingItemMobileItem'
        type: array
    type: object
  dto.DashboardResponse:
    description: Envelope for the admin dashboard endpoint.
    properties:
      daily_active_users:
        allOf:
        - $ref: '#/definitions/dto.DailyActiveUsers'
        description: Active user counts for the current week
      monthly_active_users:
        allOf:
        - $ref: '#/definitions/dto.MonthlyActiveUsers'
        description: Active user counts for the current year
      stats:
        allOf:
        - $ref: '#/definitions/dto.DashboardStats'
        description: Headline stat cards
    type: object
  dto.DashboardStats:
    description: Headline stat cards shown on the admin dashboard.
    properties:
      average_basket_size:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Average number of items per basket
      total_searches:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total product searches performed
      total_users:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total registered users
    type: object
  dto.HomeResponse:
    properties:
      banners:
        items:
          $ref: '#/definitions/dto.BannerCardDTO'
        type: array
      categories:
        items:
          $ref: '#/definitions/dto.CategoryCardDTO'
        type: array
      top_stores:
        items:
          $ref: '#/definitions/dto.PlatformDTO'
        type: array
      trending_items:
        items:
          $ref: '#/definitions/dto.VariantSearchItemDTO'
        type: array
    type: object
  dto.InventoryManagements:
    description: Paginated inventory management product list.
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      products:
        description: Page of inventory items
        items:
          $ref: '#/definitions/dto.InventoryManagementsItem'
        type: array
    type: object
  dto.InventoryManagementsItem:
    description: A single product row in the inventory management list.
    properties:
      image_url:
        description: URL of the product's display image
        type: string
      product_category:
        description: Name of the category the product belongs to
        type: string
      product_id:
        description: Unique identifier for the product
        type: string
      product_name:
        description: Display name of the product
        type: string
      product_sub_category:
        description: Name of the sub-category the product belongs to ("" if none)
        type: string
      status:
        description: Status of the product
        enum:
        - active
        - disabled
        type: string
      stock_count:
        description: Units currently in stock across all variants
        type: integer
      subcategory_id:
        description: Unique identifier of the sub-category ("" if none)
        type: string
      top_item:
        description: Whether the product is flagged as a top/featured item
        type: boolean
      total_variants:
        description: Number of variants this product has
        type: integer
    type: object
  dto.InventoryManagementsStats:
    description: Headline stat cards shown on the inventory management dashboard.
    properties:
      platforms:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of tracked delivery platforms
      total_brands:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of brands
      total_categories:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of categories
      total_products:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of products
    type: object
  dto.LivePrice:
    description: Paginated list of live product prices.
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      products:
        description: Page of product prices
        items:
          $ref: '#/definitions/dto.ProductPrice'
        type: array
    type: object
  dto.MeDTO:
    properties:
      current_city_id:
        type: string
      current_city_name:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      onboarded:
        type: boolean
      phone:
        type: string
    type: object
  dto.MobileLoginRequest:
    description: Request payload submitted to the mobile app's phone-based login endpoint.
    properties:
      phone_number:
        description: Phone number to send the login OTP to, in E.164 format
        type: string
    required:
    - phone_number
    type: object
  dto.MoneyDTO:
    properties:
      display:
        type: string
      paise:
        type: integer
    type: object
  dto.MonthlyActiveUsers:
    description: Monthly active user counts for the current year, keyed by month.
    properties:
      april:
        description: Active users in April
        type: integer
      august:
        description: Active users in August
        type: integer
      december:
        description: Active users in December
        type: integer
      february:
        description: Active users in February
        type: integer
      january:
        description: Active users in January
        type: integer
      july:
        description: Active users in July
        type: integer
      june:
        description: Active users in June
        type: integer
      march:
        description: Active users in March
        type: integer
      may:
        description: Active users in May
        type: integer
      november:
        description: Active users in November
        type: integer
      october:
        description: Active users in October
        type: integer
      september:
        description: Active users in September
        type: integer
    type: object
  dto.NotificationPreferencesDTO:
    properties:
      order_updates:
        type: boolean
      price_alerts:
        type: boolean
      promotions:
        type: boolean
    type: object
  dto.OnboardingResponse:
    properties:
      address:
        $ref: '#/definitions/dto.AddressDTO'
      user:
        $ref: '#/definitions/dto.MeDTO'
    type: object
  dto.PlatformBreakdownDTO:
    properties:
      available_item_ids:
        items:
          type: string
        type: array
      available_total:
        $ref: '#/definitions/dto.MoneyDTO'
      delivery_eta_minutes:
        type: integer
      is_cheapest:
        type: boolean
      item_total:
        $ref: '#/definitions/dto.MoneyDTO'
      logo_url:
        type: string
      platform_code:
        type: string
      platform_name:
        type: string
      unavailable_item_ids:
        items:
          type: string
        type: array
    type: object
  dto.PlatformDTO:
    properties:
      code:
        type: string
      delivery_eta_text:
        type: string
      logo_url:
        type: string
      name:
        type: string
    type: object
  dto.PlatformItem:
    description: A delivery platform (Blinkit, Zepto, ...). qc_name maps it onto
    properties:
      code:
        description: Short code used in requests, e.g. "blinkit"
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      delivery_eta_text:
        description: Fallback delivery ETA copy, e.g. "10 Mins"
        type: string
      display_name:
        description: Display name, e.g. "Blinkit"
        type: string
      display_order:
        description: Sort order in pickers
        type: integer
      enabled:
        description: Whether the platform is enabled
        type: boolean
      logo_url:
        description: URL of the platform's logo
        type: string
      platform_id:
        description: Unique identifier for the platform
        type: string
      qc_name:
        description: The platform's name on QuickCommerce, e.g. "BlinkIt". Empty =
          not mapped.
        type: string
      searchable:
        description: True when qc_name is set, i.e. the platform can be searched/linked.
        type: boolean
    type: object
  dto.PlatformPriceChipDTO:
    properties:
      available:
        type: boolean
      deep_link:
        type: string
      logo_url:
        type: string
      mrp:
        $ref: '#/definitions/dto.MoneyDTO'
      platform_code:
        type: string
      platform_name:
        type: string
      price:
        $ref: '#/definitions/dto.MoneyDTO'
    type: object
  dto.PlatformPriceItem:
    description: One active platform's live price for a product. Money is integer
      paise (3800 = ₹38.00).
    properties:
      available:
        description: Whether the product is available on this platform
        type: boolean
      mrp_paise:
        description: MRP in paise (0 when unknown)
        type: integer
      platform_code:
        description: Platform code, e.g. "blinkit"
        type: string
      platform_id:
        description: Platform identifier
        type: string
      platform_name:
        description: Platform display name, e.g. "Blinkit"
        type: string
      price_paise:
        description: Selling price in paise (0 if this platform has no price for the
          product)
        type: integer
    type: object
  dto.Platforms:
    description: Paginated list of platforms.
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      platforms:
        description: Page of platforms
        items:
          $ref: '#/definitions/dto.PlatformItem'
        type: array
    type: object
  dto.PresignedURL:
    description: Signed URL for uploading a file to the storage bucket.
    properties:
      expires_at:
        description: Expiration timestamp of the signed URL, RFC3339
        type: string
      key:
        description: Key of the file in the storage bucket
        type: string
      presigned_url:
        description: Signed URL for uploading the file
        type: string
      public_url:
        description: Public URL of the uploaded file
        type: string
    type: object
  dto.ProductCategory:
    description: Category a product belongs to.
    properties:
      product_category_id:
        description: Unique identifier for the category
        type: string
      product_category_name:
        description: Display name of the category
        type: string
    type: object
  dto.ProductDetailDTO:
    properties:
      brand_name:
        type: string
      category_id:
        type: string
      description:
        type: string
      images:
        items:
          type: string
        type: array
      name:
        type: string
      product_id:
        type: string
      similar:
        items:
          $ref: '#/definitions/dto.VariantSearchItemDTO'
        type: array
      variants:
        items:
          $ref: '#/definitions/dto.VariantDetailDTO'
        type: array
    type: object
  dto.ProductItem:
    description: A single product row as shown in product listings.
    properties:
      brand_id:
        description: Flat brand id, echoing the write shape
        type: string
      category_id:
        description: Flat category id, echoing the write shape (same value as product_category.product_category_id)
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      image_url:
        description: URL of the product's display image
        type: string
      is_top_item:
        description: Whether the product is flagged as a top/featured item
        type: boolean
      product_brand:
        allOf:
        - $ref: '#/definitions/dto.Brand'
        description: Brand the product belongs to
      product_category:
        allOf:
        - $ref: '#/definitions/dto.ProductCategory'
        description: Category the product belongs to
      product_description:
        description: Description of the product
        type: string
      product_id:
        description: Unique identifier for the product
        type: string
      product_name:
        description: Display name of the product
        type: string
      product_sub_category:
        allOf:
        - $ref: '#/definitions/dto.ProductSubCategory'
        description: Sub-category the product belongs to (zero-valued if none)
      status:
        description: Status of the product
        enum:
        - active
        - disabled
        type: string
      subcategory_id:
        description: Flat sub-category id, echoing the write shape
        type: string
    type: object
  dto.ProductPrice:
    description: A product with its live price across every active platform.
    properties:
      platform_prices:
        description: One entry per active platform (dynamic — not a fixed set)
        items:
          $ref: '#/definitions/dto.PlatformPriceItem'
        type: array
      product_category:
        description: Name of the category the product belongs to
        type: string
      product_id:
        description: Unique identifier for the product
        type: string
      product_name:
        description: Display name of the product
        type: string
    type: object
  dto.ProductSubCategory:
    description: Subcategory a product belongs to.
    properties:
      product_sub_category_id:
        description: Unique identifier for the subcategory
        type: string
      product_sub_category_name:
        description: Display name of the subcategory
        type: string
    type: object
  dto.ProductVariantItem:
    description: A single sellable variant of a product (e.g. a specific pack size).
    properties:
      product_id:
        description: Parent product's identifier
        type: string
      product_variant_id:
        description: Unique identifier for this variant
        type: string
      product_volume:
        allOf:
        - $ref: '#/definitions/dto.ProductVariantUnit'
        description: Volume or weight of this variant
      variant_custom_id:
        description: Human-readable/SKU-style identifier for this variant
        type: string
    type: object
  dto.ProductVariantItems:
    description: List of sellable variants for a product.
    properties:
      variants:
        description: Page of product variants
        items:
          $ref: '#/definitions/dto.ProductVariantItem'
        type: array
    type: object
  dto.ProductVariantUnit:
    description: Volume/weight of a product variant, e.g. "500 gm".
    properties:
      unit:
        description: Unit of measurement
        enum:
        - kg
        - gm
        - ltr
        - ml
        - pcs
        type: string
      value:
        description: |-
          Numeric quantity of the unit. Float, not int: 2.25 ltr and 1.5 ltr are real
          pack sizes, and domain.ProductVariant.VolumeValue is float64 over a numeric
          column. Whole numbers still serialise as 2, not 2.0.
        type: number
    type: object
  dto.ReferencePriceDTO:
    properties:
      available:
        type: boolean
      last_updated_at:
        type: string
      mrp_paise:
        type: integer
      platform_code:
        type: string
      platform_name:
        type: string
      price_paise:
        type: integer
    type: object
  dto.Response:
    description: Generic response envelope wrapping every API response.
    properties:
      code:
        description: Machine-readable error/status code, present on failures
        type: string
      data:
        description: Response payload, shape depends on the endpoint
      message:
        description: Human-readable message describing the result
        type: string
      status:
        description: Outcome of the request, e.g. "success" or "failed"
        type: string
    type: object
  dto.StatsItem:
    description: A single dashboard metric with its month-over-month change.
    properties:
      diff_last_month:
        description: Difference versus the previous month's value
        type: integer
      value:
        description: Current value of the metric
        type: integer
    type: object
  dto.SubCategories:
    description: Paginated list of subcategories.
    properties:
      category:
        $ref: '#/definitions/dto.CategoryData'
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      sub_categories:
        description: Page of subcategories
        items:
          $ref: '#/definitions/dto.SubCategory'
        type: array
    type: object
  dto.SubCategory:
    description: A subcategory nested under a product category.
    properties:
      category_id:
        description: Identifier of the parent category
        type: string
      category_name:
        description: Display name of the parent category
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      display_order:
        description: Curated sort order (lower shows first in the app)
        type: integer
      image_url:
        description: URL of the subcategory's display image
        type: string
      is_top_sub_category:
        description: Whether the subcategory is flagged as a top/featured subcategory
        type: boolean
      status:
        description: Status of the subcategory
        enum:
        - active
        - disabled
        type: string
      sub_category_name:
        description: Display name of the subcategory
        type: string
      subcategory_id:
        description: Unique identifier for the subcategory
        type: string
    type: object
