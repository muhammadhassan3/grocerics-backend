  /v1/inventory-management/link/batch:
    post:
      consumes:
      - application/json
      description: 'Batch form of confirm-link: one search response yields every (variant,
        platform) mapping the admin picked, sent in one call. Send price_paise + available
        per entry (from the response you''re showing) and it costs 0 credits. Entries
        are independent — a bad entry is reported in `failed` and the rest still map,
        since every write is an idempotent upsert; re-send just the failures. Afterwards
        the backend fetches these same item ids in every OTHER enabled city in the
        background, so each city gets its own real price (1 credit per item per city).'
      parameters:
      - description: Batch link request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.BatchLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.BatchLinkResult'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  type: string
              type: object
      security:
      - BearerAuth: []
      summary: Map many variants to platforms from one search response
      tags:
      - linking
  /v1/inventory-management/link/search:
    get:
      description: 'Discovery step: groupsearch across platforms so the admin can
        confirm the right item per platform. Costs 1 credit per platform. Never called
        on a consumer request.'
      parameters:
      - description: search term
        in: query
        name: q
        required: true
        type: string
      - description: city ID (supplies the QC location anchor)
        in: query
        name: city
        required: true
        type: string
      - description: comma-separated platform codes to search, e.g. blinkit,zepto.
          Omit to search every enabled QC-mapped platform. Costs 1 credit per platform.
        in: query
        name: platforms
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
