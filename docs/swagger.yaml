  /v1/search/variants:
    get:
      description: 'Variant-level search: matches products by name/brand, flattens
        to one row per variant, attaches stored REFERENCE prices for the user''s city
        filtered to the selected platforms. Zero QuickCommerce calls. City defaults
        to the user''s current city; pass ?city_id= to override.'
      parameters:
      - description: search term (min 2 chars)
        in: query
        name: q
        required: true
        type: string
      - description: comma-separated platform codes; omitted = all enabled
        in: query
        name: platforms
        type: string
      - description: override city (defaults to the user's current city)
        in: query
        name: city_id
        type: string
      - description: page number (default 1)
        in: query
        name: page
        type: integer
      - description: page size, max 100 (default 20)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.VariantSearchListDTO'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Variant search (reference prices)
      tags:
      - consumer
