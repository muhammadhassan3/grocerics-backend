  /v1/users:
    get:
      description: Paginated list of users. Admins see every tenant (optionally filter
        via ?company_id or ?unassigned=true). Non-admins are auto-scoped to their
        own company.
      parameters:
      - description: page number (default 1)
        in: query
        name: page
        type: integer
      - description: page size, max 100 (default 20)
        in: query
        name: page_size
        type: integer
      - description: 'sort column: created_at | name | email | role (default created_at)'
        in: query
        name: sort
        type: string
      - description: asc | desc (default desc)
        in: query
        name: order
        type: string
      - description: 'filter by status: active | disabled'
        in: query
        name: status
        type: string
      - description: search by name or email (max 128 chars)
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Users list
          schema:
            allOf:
