definitions:
  dto.BannerItem:
    description: A promotional banner shown on the storefront.
    properties:
      banner_id:
        description: Unique identifier for the banner
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      end_date:
        description: Date the banner stops being visible, RFC3339
        type: string
      image_url:
        description: URL of the banner image
        type: string
      is_active:
        description: Whether the banner is currently enabled
        type: boolean
      start_date:
        description: Date the banner becomes visible, RFC3339
        type: string
    type: object
  dto.Banners:
    description: Paginated list of banners.
    properties:
      banners:
        description: Page of banners
        items:
          $ref: '#/definitions/dto.BannerItem'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  dto.Brand:
    description: Brand a product belongs to.
    properties:
      product_brand_id:
        description: Unique identifier for the brand
        type: string
      product_brand_name:
        description: Display name of the brand
        type: string
    type: object
  dto.BrandItem:
    description: A product brand as shown in brand listings.
    properties:
      brand_id:
        description: Unique identifier for the brand
        type: string
      brand_name:
        description: Display name of the brand
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      image_url:
        description: URL of the brand's display image
        type: string
      is_top_brand:
        description: Whether the brand is flagged as a top/featured brand
        type: boolean
      product_count:
        description: Number of products under this brand
        type: integer
      status:
        description: Status of the brand
        enum:
        - active
        - disabled
        type: string
    type: object
  dto.BrandList:
    description: Paginated list of brands.
    properties:
      brands:
        description: Page of brands
        items:
          $ref: '#/definitions/dto.BrandItem'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  dto.Categories:
    description: Paginated list of categories.
    properties:
      categories:
        description: Page of categories
        items:
          $ref: '#/definitions/dto.Category'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  dto.Category:
    description: A top-level product category.
    properties:
      category_id:
        description: Unique identifier for the category
        type: string
      category_name:
        description: Display name of the category
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      image_url:
        description: URL of the category's display image
        type: string
      is_top_category:
        description: Whether the category is flagged as a top/featured category
        type: boolean
      status:
        description: Status of the category
        enum:
        - active
        - disabled
        type: string
      sub_category_count:
        description: Number of subcategories nested under this category
        type: integer
    type: object
  dto.DailyActiveUsers:
    description: Daily active user counts for the current week, keyed by day.
    properties:
      friday:
        description: Active users on Friday
        type: integer
      monday:
        description: Active users on Monday
        type: integer
      saturday:
        description: Active users on Saturday
        type: integer
      sunday:
        description: Active users on Sunday
        type: integer
      thursday:
        description: Active users on Thursday
        type: integer
      tuesday:
        description: Active users on Tuesday
        type: integer
      wednesday:
        description: Active users on Wednesday
        type: integer
    type: object
  dto.DashboardResponse:
    description: Envelope for the admin dashboard endpoint.
    properties:
      daily_active_users:
        allOf:
        - $ref: '#/definitions/dto.DailyActiveUsers'
        description: Active user counts for the current week
      monthly_active_users:
        allOf:
        - $ref: '#/definitions/dto.MonthlyActiveUsers'
        description: Active user counts for the current year
      stats:
        allOf:
        - $ref: '#/definitions/dto.DashboardStats'
        description: Headline stat cards
    type: object
  dto.DashboardStats:
    description: Headline stat cards shown on the admin dashboard.
    properties:
      average_basket_size:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Average number of items per basket
      total_searches:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total product searches performed
      total_users:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total registered users
    type: object
  dto.InventoryManagements:
    description: Paginated inventory management product list.
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      products:
        description: Page of inventory items
        items:
          $ref: '#/definitions/dto.InventoryManagementsItem'
        type: array
    type: object
  dto.InventoryManagementsItem:
    description: A single product row in the inventory management list.
    properties:
      image_url:
        description: URL of the product's display image
        type: string
      product_category:
        description: Name of the category the product belongs to
        type: string
      product_id:
        description: Unique identifier for the product
        type: string
      product_name:
        description: Display name of the product
        type: string
      status:
        description: Status of the product
        enum:
        - active
        - disabled
        type: string
      stock_count:
        description: Units currently in stock across all variants
        type: integer
      top_item:
        description: Whether the product is flagged as a top/featured item
        type: boolean
      total_variants:
        description: Number of variants this product has
        type: integer
    type: object
  dto.InventoryManagementsStats:
    description: Headline stat cards shown on the inventory management dashboard.
    properties:
      platforms:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of tracked delivery platforms
      total_brands:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of brands
      total_categories:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of categories
      total_products:
        allOf:
        - $ref: '#/definitions/dto.StatsItem'
        description: Total number of products
    type: object
  dto.LivePrice:
    description: Paginated list of live product prices.
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      products:
        description: Page of product prices
        items:
          $ref: '#/definitions/dto.ProductPrice'
        type: array
    type: object
  dto.MonthlyActiveUsers:
    description: Monthly active user counts for the current year, keyed by month.
    properties:
      april:
        description: Active users in April
        type: integer
      august:
        description: Active users in August
        type: integer
      december:
        description: Active users in December
        type: integer
      february:
        description: Active users in February
        type: integer
      january:
        description: Active users in January
        type: integer
      july:
        description: Active users in July
        type: integer
      june:
        description: Active users in June
        type: integer
      march:
        description: Active users in March
        type: integer
      may:
        description: Active users in May
        type: integer
      november:
        description: Active users in November
        type: integer
      october:
        description: Active users in October
        type: integer
      september:
        description: Active users in September
        type: integer
    type: object
  dto.PlatformPrice:
    description: Live price of a product across tracked delivery platforms.
    properties:
      blinkit_price:
        description: Current price on Blinkit
        type: number
      instamart_price:
        description: Current price on Instamart
        type: number
      zepto_price:
        description: Current price on Zepto
        type: number
    type: object
  dto.PresignedURL:
    description: Signed URL for uploading a file to the storage bucket.
    properties:
      expires_at:
        description: Expiration timestamp of the signed URL, RFC3339
        type: string
      key:
        description: Key of the file in the storage bucket
        type: string
      presigned_url:
        description: Signed URL for uploading the file
        type: string
      public_url:
        description: Public URL of the uploaded file
        type: string
    type: object
  dto.Pricing:
    description: Price and stock details for a product variant.
    properties:
      discounted_price:
        description: Price after discount, equal to Price when no discount applies
        type: number
      price:
        description: List price
        type: number
      stock:
        description: Units currently in stock
        type: integer
    type: object
  dto.ProductCategory:
    description: Category a product belongs to.
    properties:
      product_category_id:
        description: Unique identifier for the category
        type: string
      product_category_name:
        description: Display name of the category
        type: string
    type: object
  dto.ProductItem:
    description: A single product row as shown in product listings.
    properties:
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      image_url:
        description: URL of the product's display image
        type: string
      is_top_item:
        description: Whether the product is flagged as a top/featured item
        type: boolean
      product_brand:
        allOf:
        - $ref: '#/definitions/dto.Brand'
        description: Brand the product belongs to
      product_category:
        allOf:
        - $ref: '#/definitions/dto.ProductCategory'
        description: Category the product belongs to
      product_description:
        description: Description of the product
        type: string
      product_id:
        description: Unique identifier for the product
        type: string
      product_name:
        description: Display name of the product
        type: string
      status:
        description: Status of the product
        enum:
        - active
        - disabled
        type: string
    type: object
  dto.ProductPrice:
    description: A product with its live price across platforms.
    properties:
      platform_price:
        allOf:
        - $ref: '#/definitions/dto.PlatformPrice'
        description: Per-platform live prices
      product_category:
        description: Name of the category the product belongs to
        type: string
      product_id:
        description: Unique identifier for the product
        type: string
      product_name:
        description: Display name of the product
        type: string
    type: object
  dto.ProductVariantItem:
    description: A single sellable variant of a product (e.g. a specific pack size).
    properties:
      pricing:
        allOf:
        - $ref: '#/definitions/dto.Pricing'
        description: Price and stock for this variant
      product_id:
        description: Parent product's identifier
        type: string
      product_variant_id:
        description: Unique identifier for this variant
        type: string
      product_volume:
        allOf:
        - $ref: '#/definitions/dto.ProductVariantUnit'
        description: Volume or weight of this variant
      variant_custom_id:
        description: Human-readable/SKU-style identifier for this variant
        type: string
    type: object
  dto.ProductVariantItems:
    properties:
      variants:
        description: Page of product variants
        items:
          $ref: '#/definitions/dto.ProductVariantItem'
        type: array
    type: object
  dto.ProductVariantUnit:
    description: Volume/weight of a product variant, e.g. "500 gm".
    properties:
      unit:
        description: Unit of measurement
        enum:
        - kg
        - gm
        - ltr
        - ml
        - pcs
        type: string
      value:
        description: Numeric quantity of the unit
        type: integer
    type: object
  dto.Response:
    description: Generic response envelope wrapping every API response.
    properties:
      code:
        description: Machine-readable error/status code, present on failures
        type: string
      data:
        description: Response payload, shape depends on the endpoint
      message:
        description: Human-readable message describing the result
        type: string
      status:
        description: Outcome of the request, e.g. "success" or "failed"
        type: string
    type: object
  dto.StatsItem:
    description: A single dashboard metric with its month-over-month change.
    properties:
      diff_last_month:
        description: Difference versus the previous month's value
        type: integer
      value:
        description: Current value of the metric
        type: integer
    type: object
  dto.SubCategories:
    description: Paginated list of subcategories.
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      sub_categories:
        description: Page of subcategories
        items:
          $ref: '#/definitions/dto.SubCategory'
        type: array
    type: object
  dto.SubCategory:
    description: A subcategory nested under a product category.
    properties:
      category_id:
        description: Identifier of the parent category
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      image_url:
        description: URL of the subcategory's display image
        type: string
      is_top_sub_category:
        description: Whether the subcategory is flagged as a top/featured subcategory
        type: boolean
      status:
        description: Status of the subcategory
        enum:
        - active
        - disabled
        type: string
      sub_category_id:
        description: Unique identifier for the subcategory
        type: string
      sub_category_name:
        description: Display name of the subcategory
        type: string
    type: object
  dto.TokenResponse:
    description: Response structure for authentication tokens.
    properties:
      access_token:
        description: JWT access token used to authenticate subsequent requests
        type: string
      refresh_token:
        description: Token used to obtain a new access token once the current one
          expires
        type: string
      user_data:
        allOf:
        - $ref: '#/definitions/dto.UserData'
        description: User data associated with the authenticated user
    type: object
  dto.TopSearchProduct:
    description: Paginated list of top-searched products.
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
      products:
        description: Page of ranked products
        items:
          $ref: '#/definitions/dto.TopSearchProductItem'
        type: array
    type: object
  dto.TopSearchProductItem:
    description: A product ranked by search volume.
    properties:
      product_category:
        description: Name of the category the product belongs to
        type: string
      product_id:
        description: Unique identifier for the product
        type: string
      product_name:
        description: Display name of the product
        type: string
      search_count:
        description: Number of times the product was searched for
        type: integer
    type: object
  dto.UserDTO:
    description: Data Transfer Object for a User entity.
    properties:
      account_status:
        description: Account-level status, distinct from the user's active/disabled
          status
        enum:
        - active
        - suspended
        type: string
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      email:
        description: Email address of the user
        type: string
      id:
        description: Unique identifier for the user
        type: string
      last_active_at:
        description: Timestamp of the user's last activity, RFC3339
        type: string
      location:
        description: Free-text location of the user
        type: string
      name:
        description: Name of the user
        type: string
      role:
        description: Role of the user
        enum:
        - admin
        - client_manager
        - client
        type: string
      status:
        description: Status of the user
        enum:
        - active
        - disabled
        type: string
    type: object
  dto.UserData:
    description: User data associated with the authenticated user.
    properties:
      full_name:
        type: string
      image_url:
        type: string
      role:
        type: string
    type: object
  dto.UserListItemDTO:
    description: Per-row shape returned by GET /v1/users.
    properties:
      created_at:
        description: Creation timestamp, RFC3339
        type: string
      email:
        description: Email address of the user
        type: string
      id:
        description: Unique identifier for the user
        type: string
      last_active_at:
        description: Timestamp of the user's last activity, RFC3339
        type: string
      location:
        description: Free-text location of the user
        type: string
      name:
        description: Name of the user
        type: string
      profile_picture_url:
        description: URL of the user's profile picture
        type: string
      role:
        description: Role of the user
        enum:
        - admin
        - client_manager
        - client
        type: string
      status:
        description: Status of the user
        enum:
        - active
        - disabled
        type: string
    type: object
  dto.UserListResponseDTO:
    description: Paginated envelope for GET /v1/users.
    properties:
      items:
        description: Page of users matching the current filters
        items:
          $ref: '#/definitions/dto.UserListItemDTO'
        type: array
      meta:
        allOf:
        - $ref: '#/definitions/query.Meta'
        description: Pagination metadata
    type: object
  query.Meta:
    properties:
      page:
        type: integer
      pages:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  v1.BanUserRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  v1.CreateBannerRequest:
    properties:
      end_date:
        type: string
      image_url:
        type: string
      is_active:
        default: true
        type: boolean
      start_date:
        type: string
    required:
    - end_date
    - image_url
    - start_date
    type: object
  v1.CreateBrandRequest:
    properties:
      brand_name:
        type: string
      image_url:
        type: string
      is_top_brand:
        type: boolean
      status:
        enum:
        - active
        - disabled
        type: string
    required:
    - brand_name
    - image_url
    - is_top_brand
    - status
    type: object
  v1.CreateCategoryRequest:
    properties:
      category_name:
        type: string
      image_url:
        type: string
      is_top_category:
        type: boolean
      status:
        enum:
        - active
        - disabled
        type: string
    required:
    - category_name
    - image_url
    - is_top_category
    - status
    type: object
  v1.CreateNewItemRequest:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      image_url:
        type: string
      is_top_item:
        type: boolean
      product_description:
        type: string
      product_name:
        type: string
      status:
        enum:
        - active
        - disabled
        type: string
    required:
    - brand_id
    - category_id
    - image_url
    - is_top_item
    - product_description
    - product_name
    - status
    type: object
  v1.CreateSubcategoryRequest:
    properties:
      category_id:
        type: string
      image_url:
        type: string
      is_top_sub_category:
        type: boolean
      status:
        enum:
        - active
        - disabled
        type: string
      sub_category_name:
        type: string
    required:
    - category_id
    - image_url
    - is_top_sub_category
    - status
    - sub_category_name
    type: object
  v1.CreateVariantRequest:
    properties:
      custom_product_variant_id:
        type: string
      price:
        $ref: '#/definitions/dto.Pricing'
      product_id:
        type: string
      volume:
        $ref: '#/definitions/dto.ProductVariantUnit'
    required:
    - custom_product_variant_id
    - price
    - product_id
    - volume
    type: object
  v1.DeleteBannerRequest:
    properties:
      banner_id:
        type: string
    required:
    - banner_id
    type: object
  v1.DeleteBrandRequest:
    properties:
      brand_id:
        description: Unique identifier for the brand
        type: string
    required:
    - brand_id
    type: object
  v1.DeleteCategoryRequest:
    properties:
      category_id:
        type: string
    required:
    - category_id
    type: object
  v1.DeleteItemRequest:
    properties:
      product_id:
        type: string
    required:
    - product_id
    type: object
  v1.DeleteSubcategoryRequest:
    properties:
      sub_category_id:
        type: string
    required:
    - sub_category_id
    type: object
  v1.DeleteVariantRequest:
    properties:
      product_variant_id:
        type: string
    required:
    - product_variant_id
    type: object
  v1.ForgotPasswordRequest:
    properties:
      email:
        maxLength: 255
        type: string
    required:
    - email
    type: object
  v1.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  v1.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  v1.PresignRequest:
    properties:
      contentType:
        type: string
      fileName:
        type: string
      folder:
        type: string
    required:
    - contentType
    - fileName
    - folder
    type: object
  v1.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  v1.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    required:
    - email
    - name
    - password
    type: object
  v1.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  v1.UpdateBannerRequest:
    properties:
      banner_id:
        type: string
      end_date:
        type: string
      image_url:
        type: string
      is_active:
        type: boolean
      start_date:
        type: string
    required:
    - banner_id
    type: object
  v1.UpdateBrandRequest:
    properties:
      brand_id:
        type: string
      brand_name:
        type: string
      image_url:
        type: string
      is_top_brand:
        type: boolean
      status:
        enum:
        - active
        - disabled
        type: string
    required:
    - brand_id
    type: object
  v1.UpdateCategoryRequest:
    properties:
      category_id:
        type: string
      category_name:
        type: string
      image_url:
        type: string
      is_top_category:
        type: boolean
      status:
        enum:
        - active
        - disabled
        type: string
    required:
    - category_id
    type: object
  v1.UpdateItemRequest:
    properties:
      brand_id:
        type: string
      category_id:
        type: string
      image_url:
        type: string
      is_top_item:
        type: boolean
      product_description:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      status:
        enum:
        - active
        - disabled
        type: string
    required:
    - product_id
    type: object
  v1.UpdateSubcategoryRequest:
    properties:
      category_id:
        type: string
      image_url:
        type: string
      is_top_sub_category:
        type: boolean
      status:
        enum:
        - active
        - disabled
        type: string
      sub_category_id:
        type: string
      sub_category_name:
        type: string
    required:
    - sub_category_id
    type: object
  v1.UpdateVariantRequest:
    properties:
      custom_product_variant_id:
        type: string
      price:
        $ref: '#/definitions/dto.Pricing'
      product_id:
        type: string
      product_variant_id:
        type: string
      volume:
        $ref: '#/definitions/dto.ProductVariantUnit'
    required:
    - product_variant_id
    type: object
info:
  contact:
    name: API Support
  description: This is the API documentation for the Grocerics backend service.
  title: Grocerics API
  version: "1.1"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Issue a single-use password-reset token. Always returns 200 to
        avoid email enumeration.
      parameters:
      - description: Forgot password request payload
        in: body
        name: forgotPasswordRequest
        required: true
        schema:
          $ref: '#/definitions/v1.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: If the email exists, a reset link has been sent
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
