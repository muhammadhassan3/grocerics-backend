services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: grocerics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grocerics"]
      interval: 3s
      timeout: 3s
      retries: 15

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV: development
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: grocerics
      DB_SSLMODE: disable
      JWT_SECRET_KEY: dev-secret-change-me
      FRONTEND_ORIGINS: http://localhost:3000
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: adminpassword
      # QuickCommerce: blank -> mock client
      QC_API_KEY: ""
      QC_BASE_URL: ""
      # AWS S3 (dummy values so config.Load passes locally; real creds for uploads)
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_REGION: us-east-1
      AWS_BUCKET_NAME: grocerics-dev
    ports:
      - "8080:8080"

volumes:
  pgdata:
